
name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:

  python-packages:

    name: Release Python packages
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    environment:
      name: release

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo VERSION=$(git describe --exact-match --tags | sed 's/^v//') >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pip install build wheel

      - name: Build packages
        run: make packages VERSION=${{ steps.version.outputs.VERSION }}

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-base:
    name: Build base (${{ matrix.platform }})
    permissions:
      contents: write
      id-token: write
    environment:
      name: release
    strategy:
      matrix:
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: ubuntu-24.04
          - platform: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          podman image prune --all --force
          podman builder prune -a -f
      - name: Docker Hub token
        run: echo ${{ secrets.DOCKER_SECRET }} > docker-token.txt
      - name: Authenticate with Docker hub
        run: make docker-hub-login
      - name: Get version
        id: version
        run: echo VERSION=$(git describe --exact-match --tags | sed 's/^v//') >> $GITHUB_OUTPUT
      - name: Build container
        run: make platform-base-${{ matrix.platform }} VERSION=${{ steps.version.outputs.VERSION }}
      - name: Push container
        run: make push-platform-base-${{ matrix.platform }} VERSION=${{ steps.version.outputs.VERSION }}

  combine-base:
    name: Combine manifest base
    runs-on: ubuntu-24.04
    needs: build-base
    permissions:
      contents: write
      id-token: write
    environment:
      name: release
    steps:
      - name: Checkout
