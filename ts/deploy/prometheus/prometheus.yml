global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    monitor: "trustgraph-ts"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    scrape_interval: 15s
    static_configs:
      - targets:
          - "prometheus:9090"

  # NATS monitoring
  - job_name: "nats"
    scrape_interval: 15s
    metrics_path: "/varz"
    static_configs:
      - targets:
          - "nats:8222"

  # OpenTelemetry Collector (exposes Prometheus metrics from OTLP pipeline)
  - job_name: "otel-collector"
    scrape_interval: 15s
    static_configs:
      - targets:
          - "otel-collector:8889"

  # TrustGraph gateway (enabled when gateway container is running)
  - job_name: "gateway"
    scrape_interval: 5s
    static_configs:
      - targets:
          - "gateway:8000"
