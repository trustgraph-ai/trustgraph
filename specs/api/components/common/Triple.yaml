type: object
description: |
  RDF triple (subject-predicate-object), optionally scoped to a named graph.
required:
  - s
  - p
  - o
properties:
  s:
    $ref: './RdfValue.yaml'
    description: Subject
  p:
    $ref: './RdfValue.yaml'
    description: Predicate
  o:
    $ref: './RdfValue.yaml'
    description: Object
  g:
    type: string
    description: Named graph URI (optional)
    example: urn:graph:source
